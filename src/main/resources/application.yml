spring:
  application:
    name: zipurl
  datasource:
    url: jdbc:h2:mem:zipurl
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
  h2:
    console:
      enabled: true

server:
  port: 8080
  tomcat:
    threads:
      max: ${ZIPURL_TOMCAT_MAX_THREADS:120}
      min-spare: ${ZIPURL_TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${ZIPURL_TOMCAT_ACCEPT_COUNT:500}
    max-connections: ${ZIPURL_TOMCAT_MAX_CONNECTIONS:1500}
  compression:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

zipurl:
  generated-alias-length: 8
  max-generated-alias-attempts: 10
  cache-max-size: ${ZIPURL_CACHE_MAX_SIZE:100000}
  cache-expire-after-write-seconds: ${ZIPURL_CACHE_EXPIRE_AFTER_WRITE_SECONDS:3600}
  shared-cache-ttl: 6h
  access-count-mode: ${ZIPURL_ACCESS_COUNT_MODE:disabled}
  access-count-flush-interval-ms: ${ZIPURL_ACCESS_COUNT_FLUSH_INTERVAL_MS:1000}
  access-count-max-pending-aliases: ${ZIPURL_ACCESS_COUNT_MAX_PENDING_ALIASES:100000}
  access-count-batch-size: ${ZIPURL_ACCESS_COUNT_BATCH_SIZE:1000}
  url-cache:
    mode: local
  reserved-aliases:
    - api
    - health
    - h2-console
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${ZIPURL_DB_HOST:zipurl-do-user-39324437-0.a.db.ondigitalocean.com}:${ZIPURL_DB_PORT:25060}/${ZIPURL_DB_NAME:defaultdb}?sslmode=${ZIPURL_DB_SSLMODE:require}
    username: ${ZIPURL_DB_USERNAME:doadmin}
    password: ${ZIPURL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${ZIPURL_DB_MAX_POOL:10}
      minimum-idle: ${ZIPURL_DB_MIN_IDLE:0}
      connection-timeout: ${ZIPURL_DB_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${ZIPURL_DB_IDLE_TIMEOUT:30000}
      max-lifetime: ${ZIPURL_DB_MAX_LIFETIME:300000}
      keepalive-time: ${ZIPURL_DB_KEEPALIVE:120000}
      pool-name: ZipUrlHikariPool
      initialization-fail-timeout: ${ZIPURL_DB_INIT_FAIL_TIMEOUT:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${ZIPURL_VALKEY_HOST:zipurl-valkey-do-user-39324437-0.a.db.ondigitalocean.com}
      port: ${ZIPURL_VALKEY_PORT:25061}
      username: ${ZIPURL_VALKEY_USERNAME:default}
      password: ${ZIPURL_VALKEY_PASSWORD}
      timeout: ${ZIPURL_VALKEY_TIMEOUT:2s}
      ssl:
        enabled: true
  h2:
    console:
      enabled: false

zipurl:
  url-cache:
    mode: ${ZIPURL_URL_CACHE_MODE:valkey}
  access-count-mode: ${ZIPURL_ACCESS_COUNT_MODE:disabled}
