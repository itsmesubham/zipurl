spring:
  application:
    name: zipurl
  datasource:
    url: jdbc:h2:mem:zipurl
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

zipurl:
  generated-alias-length: 8
  max-generated-alias-attempts: 10
  access-count:
    mode: db
    flush-interval-ms: 5000
    flush-batch-size: 1000
  reserved-aliases:
    - api
    - health
    - h2-console
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${ZIPURL_DB_HOST:zipurl-do-user-39324437-0.a.db.ondigitalocean.com}:${ZIPURL_DB_PORT:25060}/${ZIPURL_DB_NAME:defaultdb}?sslmode=${ZIPURL_DB_SSLMODE:require}
    username: ${ZIPURL_DB_USERNAME:doadmin}
    password: ${ZIPURL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${ZIPURL_VALKEY_HOST:zipurl-valkey-do-user-39324437-0.a.db.ondigitalocean.com}
      port: ${ZIPURL_VALKEY_PORT:25061}
      username: ${ZIPURL_VALKEY_USERNAME:default}
      password: ${ZIPURL_VALKEY_PASSWORD}
      ssl:
        enabled: true
  jpa:
    hibernate:
      ddl-auto: ${ZIPURL_DDL_AUTO:update}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

zipurl:
  access-count:
    mode: ${ZIPURL_ACCESS_COUNT_MODE:valkey}
