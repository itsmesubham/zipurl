spring:
  application:
    name: zipurl
  datasource:
    url: jdbc:h2:mem:zipurl
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

zipurl:
  generated-alias-length: 8
  max-generated-alias-attempts: 10
  reserved-aliases:
    - api
    - health
    - h2-console
