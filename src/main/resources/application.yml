spring:
  application:
    name: zipurl
  datasource:
    url: jdbc:h2:mem:zipurl
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  h2:
    console:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

zipurl:
  generated-alias-length: 8
  max-generated-alias-attempts: 10
  local-cache-max-size: 100000
  local-cache-expire-after-access: 1h
  shared-cache-ttl: 6h
  url-cache:
    mode: local
  reserved-aliases:
    - api
    - health
    - h2-console
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${ZIPURL_DB_HOST:zipurl-do-user-39324437-0.a.db.ondigitalocean.com}:${ZIPURL_DB_PORT:25060}/${ZIPURL_DB_NAME:defaultdb}?sslmode=${ZIPURL_DB_SSLMODE:require}
    username: ${ZIPURL_DB_USERNAME:doadmin}
    password: ${ZIPURL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${ZIPURL_VALKEY_HOST:zipurl-valkey-do-user-39324437-0.a.db.ondigitalocean.com}
      port: ${ZIPURL_VALKEY_PORT:25061}
      username: ${ZIPURL_VALKEY_USERNAME:default}
      password: ${ZIPURL_VALKEY_PASSWORD}
      timeout: ${ZIPURL_VALKEY_TIMEOUT:2s}
      ssl:
        enabled: true
  jpa:
    hibernate:
      ddl-auto: ${ZIPURL_DDL_AUTO:validate}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  h2:
    console:
      enabled: false

zipurl:
  url-cache:
    mode: ${ZIPURL_URL_CACHE_MODE:valkey}
