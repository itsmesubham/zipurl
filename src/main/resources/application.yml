spring:
  application:
    name: zipurl
  threads:
    virtual:
      enabled: ${ZIPURL_VIRTUAL_THREADS_ENABLED:true}
  datasource:
    url: jdbc:h2:mem:zipurl
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: ${ZIPURL_DB_MAX_POOL:2}
      minimum-idle: ${ZIPURL_DB_MIN_IDLE:0}
      connection-timeout: ${ZIPURL_DB_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${ZIPURL_DB_IDLE_TIMEOUT:30000}
      max-lifetime: ${ZIPURL_DB_MAX_LIFETIME:300000}
      keepalive-time: ${ZIPURL_DB_KEEPALIVE:120000}
      pool-name: ZipUrlHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
  h2:
    console:
      enabled: true

server:
  port: 8080
  tomcat:
    threads:
      max: ${ZIPURL_TOMCAT_MAX_THREADS:100}
      min-spare: ${ZIPURL_TOMCAT_MIN_SPARE_THREADS:5}
    accept-count: ${ZIPURL_TOMCAT_ACCEPT_COUNT:300}
    max-connections: ${ZIPURL_TOMCAT_MAX_CONNECTIONS:2000}
  compression:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

zipurl:
  generated-alias-length: 8
  max-generated-alias-attempts: 10
  cache:
    max-size: ${ZIPURL_CACHE_MAX_SIZE:200000}
    expire-after-write-seconds: ${ZIPURL_CACHE_EXPIRE_AFTER_WRITE_SECONDS:3600}
    warmup:
      enabled: ${ZIPURL_CACHE_WARMUP_ENABLED:true}
      limit: ${ZIPURL_CACHE_WARMUP_LIMIT:50000}
  negative-cache:
    max-size: ${ZIPURL_NEGATIVE_CACHE_MAX_SIZE:50000}
    ttl-seconds: ${ZIPURL_NEGATIVE_CACHE_TTL_SECONDS:60}
  valkey:
    enabled: ${ZIPURL_VALKEY_ENABLED:true}
    ttl-seconds: ${ZIPURL_VALKEY_TTL_SECONDS:3600}
  access-count:
    mode: ${ZIPURL_ACCESS_COUNT_MODE:disabled}
    flush-interval-ms: ${ZIPURL_ACCESS_COUNT_FLUSH_INTERVAL_MS:2000}
    batch-size: ${ZIPURL_ACCESS_COUNT_BATCH_SIZE:1000}
    max-pending-aliases: ${ZIPURL_ACCESS_COUNT_MAX_PENDING_ALIASES:100000}
  create:
    max-concurrent: ${ZIPURL_CREATE_MAX_CONCURRENT:5}
  url-cache:
    mode: local
  reserved-aliases:
    - api
    - health
    - h2-console
---
spring:
  config:
    activate:
      on-profile: postgres
  threads:
    virtual:
      enabled: ${ZIPURL_VIRTUAL_THREADS_ENABLED:true}
  datasource:
    url: jdbc:postgresql://${ZIPURL_DB_HOST:zipurl-do-user-39324437-0.a.db.ondigitalocean.com}:${ZIPURL_DB_PORT:25060}/${ZIPURL_DB_NAME:defaultdb}?sslmode=${ZIPURL_DB_SSLMODE:require}
    username: ${ZIPURL_DB_USERNAME:doadmin}
    password: ${ZIPURL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${ZIPURL_DB_MAX_POOL:2}
      minimum-idle: ${ZIPURL_DB_MIN_IDLE:0}
      connection-timeout: ${ZIPURL_DB_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${ZIPURL_DB_IDLE_TIMEOUT:30000}
      max-lifetime: ${ZIPURL_DB_MAX_LIFETIME:300000}
      keepalive-time: ${ZIPURL_DB_KEEPALIVE:120000}
      pool-name: ZipUrlHikariPool
      initialization-fail-timeout: ${ZIPURL_DB_INIT_FAIL_TIMEOUT:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${ZIPURL_VALKEY_HOST:zipurl-valkey-do-user-39324437-0.a.db.ondigitalocean.com}
      port: ${ZIPURL_VALKEY_PORT:25061}
      username: ${ZIPURL_VALKEY_USERNAME:default}
      password: ${ZIPURL_VALKEY_PASSWORD}
      timeout: ${ZIPURL_VALKEY_TIMEOUT:2s}
      ssl:
        enabled: true
  h2:
    console:
      enabled: false

zipurl:
  url-cache:
    mode: ${ZIPURL_URL_CACHE_MODE:valkey}
  cache:
    max-size: ${ZIPURL_CACHE_MAX_SIZE:200000}
    expire-after-write-seconds: ${ZIPURL_CACHE_EXPIRE_AFTER_WRITE_SECONDS:3600}
    warmup:
      enabled: ${ZIPURL_CACHE_WARMUP_ENABLED:true}
      limit: ${ZIPURL_CACHE_WARMUP_LIMIT:50000}
  negative-cache:
    max-size: ${ZIPURL_NEGATIVE_CACHE_MAX_SIZE:50000}
    ttl-seconds: ${ZIPURL_NEGATIVE_CACHE_TTL_SECONDS:60}
  valkey:
    enabled: ${ZIPURL_VALKEY_ENABLED:true}
    ttl-seconds: ${ZIPURL_VALKEY_TTL_SECONDS:3600}
  access-count:
    mode: ${ZIPURL_ACCESS_COUNT_MODE:disabled}
    flush-interval-ms: ${ZIPURL_ACCESS_COUNT_FLUSH_INTERVAL_MS:2000}
    batch-size: ${ZIPURL_ACCESS_COUNT_BATCH_SIZE:1000}
    max-pending-aliases: ${ZIPURL_ACCESS_COUNT_MAX_PENDING_ALIASES:100000}
  create:
    max-concurrent: ${ZIPURL_CREATE_MAX_CONCURRENT:5}
